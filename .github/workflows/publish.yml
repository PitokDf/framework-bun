name: Publish to NPM

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'package.json'
      - 'create-buntok/package.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js (for NPM Publish)
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Publish to NPM
        run: |
          npm publish || true
          cd create-buntok
          npm publish || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
