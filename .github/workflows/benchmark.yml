name: Benchmark Suite

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bombardier
        run: |
          wget https://github.com/codesenberg/bombardier/releases/download/v1.2.6/bombardier-linux-amd64
          mv bombardier-linux-amd64 bombardier
          chmod +x bombardier

      - name: Install Dependencies
        run: bun install

      - name: Run Benchmarks
        run: bun run bench:all

      - name: Build Dashboard
        run: |
          cd benchmarks/dashboard
          npm install
          cp ../../dashboard-data.json public/
          npm run build
        
      - name: Upload Dashboard Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: benchmarks/dashboard/dist

  deploy:
    needs: benchmark
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
