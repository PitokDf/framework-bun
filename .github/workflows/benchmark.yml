name: Benchmark

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install bombardier
        run: |
          wget https://github.com/codesenberg/bombardier/releases/download/v1.2.6/bombardier-linux-amd64 -O bombardier
          chmod +x bombardier

      - name: Run benchmark
        run: bun run bench:all

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Buntok Benchmark
          tool: 'customBiggerIsBetter'
          output-file-path: benchmark-output.json
          auto-push: ${{ github.event_name != 'pull_request' }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: 'bench'
          alert-threshold: '110%'
          fail-on-alert: true
          comment-on-alert: ${{ github.event_name == 'pull_request' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          summary-always: true
