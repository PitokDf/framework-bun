<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <title>Bun Framework Logo</title>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FF6B00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" stroke="#3d3d5c" stroke-width="2"/>
  
  <!-- Lightning bolt -->
  <path d="M 55 15 L 35 50 L 50 50 L 40 85 L 65 45 L 50 45 Z" 
        fill="url(#boltGrad)" 
        filter="url(#glow)"
        stroke="#FFF"
        stroke-width="1"
        stroke-linejoin="round"/>
  
  <!-- Speed lines -->
  <line x1="15" y1="30" x2="25" y2="30" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
  <line x1="10" y1="40" x2="22" y2="40" stroke="#FFA500" stroke-width="2" opacity="0.5"/>
  <line x1="15" y1="50" x2="25" y2="50" stroke="#FFD700" stroke-width="2" opacity="0.4"/>
  <line x1="12" y1="60" x2="24" y2="60" stroke="#FFA500" stroke-width="2" opacity="0.3"/>
  
  <!-- Text "BUN" -->
  <text x="50" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFD700">BUN</text>
</svg>
